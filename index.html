        <style>
        html, body, #map {
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
        }
        .gps-btn {
            width: 40px;
            height: 40px;
            background: #fff;
            border-radius: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gps-btn svg {
            width: 22px;
            height: 22px;
        }
        .gps-btn.active svg circle.gps-dot,
        .gps-btn.active svg path {
            fill: #1a73e8;
            stroke: #1a73e8;
        }
        .gps-btn:not(.active) svg circle.gps-dot,
        .gps-btn:not(.active) svg path {
            fill: #666;
            stroke: #666;
        }
        .gps-marker .gps-dot-inner {
            width: 14px;
            height: 14px;
            background: #1a73e8;
            border: 2px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 3px rgba(0,0,0,0.6);
            position: absolute;
            top: 2px;
            left: 2px;
        }
        .gps-marker.pulse::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: rgba(26,115,232,0.35);
            border-radius: 50%;
            animation: gpsPulse 1.8s infinite;
        }
        @keyframes gpsPulse {
            0% { transform: scale(0.4); opacity: 0.8; }
            100% { transform: scale(2.6); opacity: 0; }
        }
        .gps-acc-label {
            background: rgba(0,0,0,0.65);
            color: #fff;
            border: none;
            box-shadow: none;
            font-size: 11px;
            padding: 1px 5px;
        }
        .gps-acc-label::before { display: none; }
        </style>
        <title> (QFieldCloud)</title>

        var hash = new L.Hash(map);

        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }

        var gpsWatchId = null;
        var gpsMarker = null;
        var gpsAccuracyCircle = null;
        var gpsFirstFix = true;
        var gpsBestAccuracy = Infinity;
        var gpsLastFixTime = 0;
        var gpsTimeoutCount = 0;
        var gpsRetryTimer = null;

        function gpsIcon() {
            return L.divIcon({

        function toggleGps(btn) {
            if (gpsWatchId !== null) {
                stopGps(btn);
            } else {
                startGps(btn);
            }
        }

        function startGps(btn) {
            if (!navigator.geolocation) {
                alert('GPS not supported ee browser-il.');
                return;
            }
            gpsFirstFix = true;
            gpsBestAccuracy = Infinity;
            gpsLastFixTime = 0;
            gpsTimeoutCount = 0;
            btn.classList.add('active');

            // step 1: quick coarse fix (network/wifi/cell tower) - fast, low battery
            navigator.geolocation.getCurrentPosition(onGpsPosition, function(){}, {
                enableHighAccuracy: false,
                maximumAge: 30000,
                timeout: 8000
            });

            // step 2: continuous high-accuracy GPS watch, refines the point as satellite fix improves
            // long timeout because a real GPS satellite fix (not wifi/tower) can take
            // 15-30+ seconds outdoors, and much longer / never indoors
            gpsWatchId = navigator.geolocation.watchPosition(onGpsPosition, onGpsError, {
                enableHighAccuracy: true,
                maximumAge: 5000,
                timeout: 30000
            });
        }

        function stopGps(btn) {
            if (gpsWatchId !== null) {
                navigator.geolocation.clearWatch(gpsWatchId);
                gpsWatchId = null;
            }
            if (gpsRetryTimer) { clearTimeout(gpsRetryTimer); gpsRetryTimer = null; }
            btn.classList.remove('active');
            if (gpsMarker) { map.removeLayer(gpsMarker); gpsMarker = null; }
            if (gpsAccuracyCircle) { map.removeLayer(gpsAccuracyCircle); gpsAccuracyCircle = null; }
            gpsBestAccuracy = Infinity;
        }

        function onGpsPosition(pos) {
            gpsTimeoutCount = 0;
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            var acc = pos.coords.accuracy;
            var now = Date.now();
            var latlng = L.latLng(lat, lng);

            // Jump filter: reject a fix that is much worse (bigger accuracy radius)
            // than our recent best, unless it's been a while since the last update
            // (accuracy naturally worsens temporarily indoors / under tree cover etc.)
            var staleGap = now - gpsLastFixTime;
            if (!gpsFirstFix && acc > gpsBestAccuracy * 2.5 && staleGap < 8000) {
                return;
            }

            gpsLastFixTime = now;
            gpsBestAccuracy = Math.min(gpsBestAccuracy, acc);

            if (!gpsMarker) {
                gpsMarker = L.marker(latlng, { icon: gpsIcon(), zIndexOffset: 1000 }).addTo(map);
                gpsMarker.bindTooltip('', { permanent: true, direction: 'bottom', offset: [0, 6], className: 'gps-acc-label' });
            } else {
                gpsMarker.setLatLng(latlng);
            }
            gpsMarker.setTooltipContent('±' + Math.round(acc) + ' m');

            if (!gpsAccuracyCircle) {
                gpsAccuracyCircle = L.circle(latlng, {
                    radius: acc,
                    color: '#1a73e8',
                    weight: 1,
                    fillColor: '#1a73e8',
                    fillOpacity: 0.15
                }).addTo(map);
            } else {
                gpsAccuracyCircle.setLatLng(latlng);
                gpsAccuracyCircle.setRadius(acc);
            }

            if (gpsFirstFix) {
                map.setView(latlng, Math.max(map.getZoom(), 18));
                gpsFirstFix = false;
            } else if (!map.getBounds().pad(-0.15).contains(latlng)) {
                // keep the moving point in view without fighting user's manual pan/zoom too much
                map.panTo(latlng);
            }
        }

        function onGpsError(err) {
            var btn = document.querySelector('.gps-btn');
            // code 1 = PERMISSION_DENIED, 2 = POSITION_UNAVAILABLE, 3 = TIMEOUT
            if (err.code === 1) {
                alert('GPS permission deny cheythu. Browser settings-il location allow cheyyuka.');
                if (btn) stopGps(btn);
                return;
            }

            // TIMEOUT / POSITION_UNAVAILABLE: don't switch off, just keep retrying.
            // A satellite fix can genuinely take a while (open sky needed), so this
            // is normal, not fatal - Google Maps app just silently retries too.
            gpsTimeoutCount++;

            if (gpsTimeoutCount === 1) {
                // quiet coarse re-fix immediately, so a marker/point still shows
                navigator.geolocation.getCurrentPosition(onGpsPosition, function(){}, {
                    enableHighAccuracy: false,
                    maximumAge: 15000,
                    timeout: 8000
                });
            }

            if (gpsTimeoutCount >= 3 && !gpsRetryTimer) {
                // after repeated high-accuracy timeouts, restart the watch with a
                // relaxed accuracy requirement - works better on weak-signal devices
                gpsRetryTimer = setTimeout(function() {
                    gpsRetryTimer = null;
                    if (gpsWatchId !== null) {
                        navigator.geolocation.clearWatch(gpsWatchId);
                    }
                    gpsWatchId = navigator.geolocation.watchPosition(onGpsPosition, onGpsError, {
                        enableHighAccuracy: gpsTimeoutCount < 6,
                        maximumAge: 10000,
                        timeout: 30000
                    });
                }, 500);
            }
        }
